#   write_file: ""             # Write captured packets to PCAP file

# ============================================================================
# VOIP CONFIGURATION (lc sniff voip, shared with hunt/tap voip)
# ============================================================================

voip:
  # SIP/RTP Port Configuration
  # sip_ports: ""               # SIP ports (comma-separated, default: 5060)
  # rtp_port_ranges: ""         # RTP port ranges (default: 10000-32768)
  # udp_only: false             # UDP-only mode, skip TCP reassembly

  # Pattern Matching
  # pattern_algorithm: auto     # Algorithm: auto, linear, aho-corasick
  # pattern_buffer_mb: 64       # Pattern buffer memory in MB

  # TCP Stream Processing
  max_goroutines: 1000          # Max concurrent TCP stream goroutines
  tcp_cleanup_interval: 60s     # How often to clean up TCP resources
  tcp_buffer_max_age: 300s      # Maximum age for TCP packet buffers
  tcp_stream_max_queue_time: 120s  # Maximum time a stream can wait in queue
  max_tcp_buffers: 10000        # Maximum number of TCP packet buffers
  tcp_stream_timeout: 600s      # Timeout for TCP stream processing
  tcp_assembler_max_pages: 100  # Maximum pages for TCP assembler
  tcp_sip_idle_timeout: 120s    # SIP TCP idle timeout (RFC 5626)

  # State-Based TCP Timeouts (advanced)
  # enable_state_tcp_timeouts: false     # Enable state-based timeout management
  # tcp_opening_timeout: 5m             # Timeout for connections without SIP data
  # tcp_established_timeout: 30m        # Timeout for established SIP connections
  # tcp_closing_timeout: 5m             # Timeout for connections in closing state
  # enable_call_aware_timeout: false    # Keep streams open for active calls

  # Performance Mode Selection
  # Options: "balanced", "throughput", "latency", "memory"
  tcp_performance_mode: "balanced"

  # Buffer Strategy
  # Options: "adaptive", "fixed", "ring"
  tcp_buffer_strategy: "adaptive"

  # Backpressure and Memory
  enable_backpressure: true
  memory_optimization: false

  # Advanced Performance Tuning
  tcp_buffer_pool_size: 1000
  tcp_batch_size: 32
  tcp_io_threads: 4
  tcp_compression_level: 1         # 0=none, 1=fast
  tcp_memory_limit: 104857600      # 100MB
  tcp_latency_optimization: false
  enable_auto_tuning: true

  # PCAP Grace Period
  # pcap_grace_period: 5s          # Grace period before closing per-call PCAP

  # GPU Acceleration (CUDA builds only)
  # gpu_enable: true               # Enable GPU acceleration
  # gpu_backend: auto              # Backend: auto, cuda, opencl, cpu-simd, disabled
  # gpu_batch_size: 1024           # GPU processing batch size
  # gpu_max_memory: 0              # Max GPU memory in bytes (0=unlimited)

  # VoIP Security
  security:
    sanitize_call_ids: false          # Enable Call-ID sanitization in logs
    call_id_hash_length: 8            # Hash prefix length for sanitized Call-IDs
    call_id_max_log_length: 16        # Max Call-ID length before sanitization
    enable_pcap_encryption: false     # Enable PCAP file encryption
    max_content_length: 1048576       # Max SIP Content-Length (1MB, DoS protection)
    max_message_size: 2097152         # Max total SIP message size (2MB)

  # PCAP Encryption (only when enable_pcap_encryption is true)
  encryption:
    enabled: false
    key_file: "/etc/lippycat/keys/pcap.key"
    algorithm: "aes-256-gcm"
    key_derive: "pbkdf2"
    pbkdf2_iterations: 100000

  # Plugin System (disabled by default)
  # plugins_enabled: false
  # plugin_paths: []
  # plugin_watch_enabled: false
  # plugin_sip_enabled: true
  # plugin_rtp_enabled: true
  # plugin_generic_enabled: true

  # Monitoring (disabled by default)
  # monitoring_enabled: false
  # metrics_enabled: false
  # tracing_enabled: false
  # monitoring_update_interval: 30s
  # enable_runtime_metrics: true
  # enable_system_metrics: false
  # enable_plugin_metrics: true

# ============================================================================
# HUNTER NODE (lc hunt)
# ============================================================================

# hunter:
#   processor_addr: ""           # Processor address, e.g. "processor:55555" (required)
#   id: ""                       # Hunter identifier (default: hostname)
#   interfaces:                  # Network interfaces to capture on
#     - any
#   bpf_filter: ""               # BPF filter expression
#   buffer_size: 10000           # Packet buffer size
#   batch_size: 64               # Packets per gRPC batch
#   batch_timeout_ms: 100        # Max time before sending partial batch (ms)
#   batch_queue_size: 0          # Batch queue buffer (0=default 1000)
#   insecure: false              # Allow unencrypted connections
#   no_filter_policy: deny       # Behavior when no filters active: allow, deny
#
#   # Disk Overflow Buffer
#   disk_buffer:
#     enabled: false             # Enable disk overflow when network is slow
#     dir: /var/tmp/lippycat-buffer
#     max_mb: 1024               # Maximum disk buffer size in MB
#
#   # TLS Client Configuration
#   tls:
#     cert_file: ""              # Client certificate for mTLS
#     key_file: ""               # Client private key
#     ca_file: ""                # CA certificate to verify processor
#     skip_verify: false         # Skip server certificate verification (insecure!)
#
#   # VoIP-specific hunter settings
#   voip:
#     udp_only: false            # UDP-only mode
#     sip_ports: ""              # SIP ports (comma-separated)
#     rtp_port_ranges: ""        # RTP port ranges
#
#   # GPU VoIP Filtering (CUDA builds only)
#   voip_filter:
#     enabled: false             # Enable GPU-accelerated VoIP filtering
#     gpu_backend: auto          # Backend: auto, cuda, opencl, cpu-simd
#     gpu_batch_size: 100        # GPU batch size

# ============================================================================
# PROCESSOR NODE (lc process)
# ============================================================================

# processor:
#   listen_addr: ":55555"        # Listen address for hunters and TUI clients
#   id: ""                       # Processor identifier (default: hostname)
#   processor_addr: ""           # Upstream processor for hierarchical mode
#   max_hunters: 100             # Maximum hunter connections
#   max_subscribers: 100         # Maximum TUI subscriber connections
#   write_file: ""               # Write all packets to unified PCAP file
#   display_stats: true          # Display statistics on stdout
#   enable_detection: true       # Enable protocol detection
#   filter_file: ""              # Filter persistence file (JSON)
#   insecure: false              # Allow unencrypted connections
#
#   # TLS Server Configuration
#   tls:
#     cert_file: ""              # Server TLS certificate
#     key_file: ""               # Server TLS private key
#     ca_file: ""                # CA certificate for client verification (mTLS)
#     client_auth: false         # Require client certificates (mutual TLS)
#
#   # Per-Call PCAP (VoIP)
#   per_call_pcap:
#     enabled: false             # Write individual PCAP per VoIP call
#     output_dir: ./pcaps        # Output directory
#     file_pattern: "{timestamp}_{callid}.pcap"  # Filename pattern
#
#   # Auto-Rotating PCAP (non-VoIP or general capture)
#   auto_rotate_pcap:
#     enabled: false             # Enable auto-rotating PCAP files
#     output_dir: ./auto-rotate-pcaps
#     file_pattern: "{timestamp}.pcap"
#     idle_timeout: 30s          # Close file after this idle time
#     max_size: 100M             # Max file size before rotation (K/M/G/T)
#
#   # Virtual Interface (packet injection)
#   virtual_interface: false
#   vif_name: lc0
#   vif_type: tap
#   vif_buffer_size: 65536
#   vif_netns: ""
#   vif_drop_privileges: ""
#
#   # Command Hooks (executed on events)
#   pcap_command: ""             # Run on PCAP file close (placeholder: %pcap%)
#   voip_command: ""             # Run on VoIP call complete (%callid%, %dirname%)
#   command_timeout: 30s         # Max command execution time
#   command_concurrency: 10      # Max concurrent command executions
#
#   # DNS Tunneling Detection
#   tunneling_command: ""        # Run when DNS tunneling detected
#   tunneling_threshold: 0.7    # Detection score threshold (0.0-1.0)
#   tunneling_debounce: 5m      # Minimum time between alerts per domain
#
#   # TLS Keylog
#   tls_keylog:
#     output_dir: ""             # Directory for TLS keylog files
#
#   # Lawful Interception (LI builds only, requires -tags li)
#   li:
#     enabled: false
#     x1_listen_addr: ":8443"          # X1 admin interface listen address
#     x1_tls_cert: ""                  # X1 server certificate
#     x1_tls_key: ""                   # X1 server key
#     x1_tls_ca: ""                    # X1 client CA (ADMF verification)
#     admf_endpoint: ""                # ADMF endpoint
#     admf_tls_cert: ""                # ADMF client certificate
#     admf_tls_key: ""                 # ADMF client key
#     admf_tls_ca: ""                  # ADMF CA certificate
#     admf_keepalive: 30s              # ADMF keepalive interval
#     delivery_tls_cert: ""            # X2/X3 delivery certificate
#     delivery_tls_key: ""             # X2/X3 delivery key
#     delivery_tls_ca: ""              # X2/X3 delivery CA (MDF verification)
#     delivery_tls_pinned_cert: []     # Pinned MDF certificates

