# lippycat Configuration Reference
# Place this file at one of:
#   1. ~/.config/lippycat/config.yaml (preferred)
#   2. ~/.config/lippycat.yaml
#   3. ~/.lippycat.yaml
#
# Priority: CLI flags > environment variables > config file > defaults
# Environment: LIPPYCAT_PRODUCTION=true enforces TLS (blocks --insecure)

# ============================================================================
# GLOBAL SETTINGS
# ============================================================================

# PCAP read timeout in milliseconds (default: 200)
# Controls how often capture goroutines check for shutdown signals.
# Lower values (50-100ms) = faster shutdown response, potentially choppy display
# Higher values (200-500ms) = smoother display, slightly slower shutdown
# Also settable via env: LIPPYCAT_PCAP_TIMEOUT_MS=200
# pcap_timeout_ms: 200

# Enable promiscuous mode for packet capture (default: false)
# promiscuous: false

# Kernel PCAP buffer size in bytes (default: 16777216 = 16MB)
# pcap_buffer_size: 16777216

# ============================================================================
# SNIFF COMMAND (lc sniff)
# ============================================================================

# sniff:
#   quiet: false              # Suppress packet output (-q)
#   format: json              # Output format: json, text
#   write_file: ""            # Write captured packets to PCAP file (-w)
#
#   # Virtual Interface (packet injection into a virtual NIC)
#   virtual_interface: false  # Enable virtual network interface (-V)
#   vif_name: lc0             # Interface name
#   vif_type: tap             # Interface type: tap (Layer 2) or tun (Layer 3)
#   vif_buffer_size: 65536    # Injection queue buffer size (packets)
#   vif_startup_delay: 3s     # Delay before packet injection starts
#   vif_replay_timing: false  # Respect original PCAP packet timing
#   vif_netns: ""             # Network namespace for isolation
#   vif_drop_privileges: ""   # Drop privileges to this user after setup

# ============================================================================
# DNS SNIFF (lc sniff dns)
# ============================================================================

# dns:
#   domain_pattern: ""         # Filter by domain pattern (glob, e.g. "*.example.com")
#   domains_file: ""           # Load domain patterns from file (one per line)
#   udp_only: false            # Capture UDP DNS only (skip TCP)
#   ports: "53"                # DNS ports (comma-separated)
#   track_queries: true        # Enable query/response correlation
#   detect_tunneling: true     # Enable DNS tunneling detection
#   write_file: ""             # Write captured packets to PCAP file

# ============================================================================
# TLS SNIFF (lc sniff tls)
# ============================================================================

# tls:
#   sni_pattern: ""            # Filter by SNI pattern (glob, e.g. "*.example.com")
#   sni_file: ""               # Load SNI patterns from file
#   ja3: ""                    # Filter by JA3 hash (32-char hex)
#   ja3_file: ""               # Load JA3 hashes from file
#   ja3s: ""                   # Filter by JA3S hash (32-char hex)
#   ja3s_file: ""              # Load JA3S hashes from file
#   ja4: ""                    # Filter by JA4 fingerprint
#   ja4_file: ""               # Load JA4 fingerprints from file
#   ports: "443"               # TLS ports (comma-separated)
#   track_connections: true    # Enable ClientHello/ServerHello correlation
#   write_file: ""             # Write captured packets to PCAP file

# ============================================================================
# HTTP SNIFF (lc sniff http)
# ============================================================================

# http:
#   host_pattern: ""           # Filter by host (glob, e.g. "*.example.com")
#   path_pattern: ""           # Filter by URL path (glob, e.g. "/api/*")
#   methods: ""                # HTTP methods (comma-separated, e.g. "GET,POST")
#   status_codes: ""           # Status codes (e.g. "4xx,500")
#   user_agent_pattern: ""     # Filter by User-Agent (glob)
#   content_type_pattern: ""   # Filter by Content-Type (glob)
#   hosts_file: ""             # Load host patterns from file
#   paths_file: ""             # Load path patterns from file
#   user_agents_file: ""       # Load User-Agent patterns from file
#   content_types_file: ""     # Load Content-Type patterns from file
#   keywords_file: ""          # Load keywords for body matching
#   ports: "80,8080,8000,3000,8888"  # HTTP ports (comma-separated)
#   track_requests: true       # Enable request/response tracking
#   capture_body: false        # Capture HTTP body content
#   max_body_size: 65536       # Maximum body capture size in bytes (64KB)
#   tls_keylog: ""             # Path to SSLKEYLOGFILE for TLS decryption
#   tls_keylog_pipe: ""        # Named pipe for live TLS key injection
#   write_file: ""             # Write captured packets to PCAP file

# ============================================================================
# EMAIL SNIFF (lc sniff email)
# ============================================================================

# email:
#   address_pattern: ""        # Filter by email address (glob)
#   sender_pattern: ""         # Filter by sender (glob)
#   recipient_pattern: ""      # Filter by recipient (glob)
#   subject_pattern: ""        # Filter by subject (glob)
#   mailbox_pattern: ""        # Filter by IMAP mailbox (glob)
#   command_pattern: ""        # Filter by IMAP/POP3 command (glob)
#   addresses_file: ""         # Load address patterns from file
#   senders_file: ""           # Load sender patterns from file
#   recipients_file: ""        # Load recipient patterns from file
